services:

  # PostgreSQL
  db:
    container_name: clinica_db
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-clinica}
      POSTGRES_USER: ${DB_USER:-clinica}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-clinica_senha}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - clinica_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-clinica}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend FastAPI
  backend:
    container_name: clinica_backend
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-clinica}:${DB_PASSWORD:-clinica_senha}@db:5432/${DB_NAME:-clinica}
      SECRET_KEY: ${SECRET_KEY:-troque-esta-chave-secreta-em-producao}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_MB: 5
    volumes:
      - uploads:/app/uploads
    networks:
      - clinica_net

  # Frontend React
  frontend:
    container_name: clinica_frontend
    build: ./frontend
    restart: always
    networks:
      - clinica_net

  # Nginx proxy reverso
  nginx:
    container_name: clinica_nginx
    image: nginx:alpine
    restart: always
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/app/uploads:ro
    networks:
      - clinica_net

volumes:
  db_data:
  uploads:

networks:
  clinica_net:
    driver: bridge
